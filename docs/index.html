<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメコメ動画</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
</head>
<body>
<h1>コメコメ動画</h1>

<div id="loginForm">
  <input type="text" id="loginName" placeholder="名前">
  <input type="password" id="loginPassword" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
  <button onclick="register()">新規登録</button>
  <p id="loginStatus"></p>
</div>

<div id="mainContent" style="display:none">
  <input type="text" id="videoUrl" placeholder="動画URL">
  <button onclick="loadVideo()">動画再生</button>

  <div id="playerWrap">
    <div id="player"></div>
    <div id="comments"></div>
  </div>

  <div id="commentForm">
    <input type="text" id="commentText" placeholder="コメント">
    <select id="commentSize">
      <option value="small">小</option>
      <option value="medium" selected>中</option>
      <option value="large">大</option>
    </select>
    <select id="commentPos">
      <option value="flow" selected>流れる</option>
      <option value="top">上</option>
      <option value="middle">中</option>
      <option value="bottom">下</option>
    </select>
    <input type="color" id="commentColor">
    <button onclick="postComment()">送信</button>
  </div>

  <div id="commentList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
