<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメコメ動画</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
</head>
<body>
<div id="loginWrap">
  <h1>ログイン / 新規登録</h1>
  <input type="text" id="name" placeholder="ユーザー名">
  <input type="password" id="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
  <button onclick="register()">新規登録</button>
  <div id="loginMsg"></div>
</div>

<div id="mainWrap" style="display:none;">
  <h1>コメコメ動画</h1>
  <input type="text" id="videoUrl" placeholder="YouTube動画URL">
  <button onclick="loadVideo()">再生</button>

  <div id="playerWrap">
    <div id="player"></div>
    <div id="comments"></div>
  </div>

  <select id="speed" onchange="changeSpeed()">
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="1.5">1.5x</option>
    <option value="2">2x</option>
  </select>

  <div id="commentForm">
    <input type="text" id="commentText" placeholder="コメント">
    <select id="color">
      <option value="">自動</option>
      <option value="white">白</option>
      <option value="yellow">黄</option>
      <option value="green">緑</option>
      <option value="blue">青</option>
      <option value="red">赤</option>
    </select>
    <select id="size">
      <option value="medium" selected>中</option>
      <option value="small">小</option>
      <option value="large">大</option>
    </select>
    <select id="position">
      <option value="flow" selected>流れる</option>
      <option value="top">上</option>
      <option value="middle">中</option>
      <option value="bottom">下</option>
    </select>
    <button onclick="sendComment()">送信</button>
  </div>

  <h2>コメントリスト</h2>
  <ul id="commentList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
